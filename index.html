<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$ANSEM Meme Factory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glow-bg"></div>

    <main class="app-container">
        <header>
            <h1 class="neon-text">$ANSEM <span>MEME FACTORY</span></h1>
            <p class="subtitle">Generate high-conviction media & trigger the distribution multiplier.</p>
        </header>

        <section class="workspace">
    <div class="main-stage">
        <!-- Canvas Preview Window -->
        <div class="canvas-wrapper">
            <canvas id="memeCanvas" width="600" height="600"></canvas>
        </div>

        <!-- Inputs right underneath the Canvas -->
        <div class="form-row">
            <div class="input-group">
                <label for="memeText">Meme Caption</label>
                <input type="text" id="memeText" value="CONVICTION IS RISING" placeholder="CONVICTION IS RISING" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="userWallet">Submit Wallet for Airdrop Validation</label>
                <input type="text" id="userWallet" placeholder="SOLANA WALLET..." autocomplete="off">
            </div>
        </div>

        <button id="btnShare" class="btn btn-primary">
            UPDATE PREVIEW & GENERATE SHAREABLE LINK
        </button>
    </div>

    <!-- Live Feedback Sidebar on the Right -->
    <aside class="feedback-sidebar">
        <h3>Live feedback</h3>
        <p class="sidebar-sub">Generated caption...</p>
        <div class="preview-thumbs">
            <div class="thumb-card active">
                <img src="1001732203.jpg" alt="Template">
                <span>BULLISH</span>
            </div>
            <div class="thumb-card">
                <img src="1001732203.jpg" alt="Template">
                <span>BULLISH</span>
            </div>
        </div>
    </aside>
</section>
